name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (example: v1.6.0.1)"
        required: false
        default: ""
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.ref }}

      - name: Resolve tag
        id: meta
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ inputs.tag }}' -ne '') {
            $tag = '${{ inputs.tag }}'
          } elseif ('${{ github.ref }}' -like 'refs/tags/*') {
            $tag = '${{ github.ref_name }}'
          } else {
            throw "No tag resolved. For manual runs, provide inputs.tag."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore AchManager.sln

      - name: Build
        run: dotnet build AchManager.sln -c Release --no-restore

      - name: Package
        shell: pwsh
        run: |
          $publishPath = Join-Path $PWD "AchManager/bin/x64/Release"
          if (-not (Test-Path $publishPath)) {
            throw "Build output not found: $publishPath"
          }
          Compress-Archive -Path "$publishPath/*" -DestinationPath "latest.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: latest.zip
          generate_release_notes: true
